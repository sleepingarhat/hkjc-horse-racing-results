name: HKJC Daily Scraper Auto Update

on:
  schedule:
    - cron: '30 3 * * *'        # 香港時間每天凌晨 11:30 自動運行
  workflow_dispatch:            # 允許你手動觸發測試

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager

      - name: Run HKJC Scraper
        run: python RacingData_Scraper.py

      - name: Commit and push new data
        run: |
          git config --global user.name "HKJC Scraper Bot"
          git config --global user.email "scraper@bot.com"
          git add data/ *.csv
          git commit -m "Auto update: $(date +'%Y-%m-%d') new race data" || echo "No new data"