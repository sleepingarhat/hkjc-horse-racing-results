name: Capy Trainer Scraper

# Runs TrainerData_Scraper.py (requests-based, no Selenium).
# Writes trainers/records/<TID>.csv using trainerpastrec SSR pages.

on:
  schedule:
    # HK 01:00 daily = UTC 17:00 previous day
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass fixture_guard (run even if no race in past 2 days)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  trainers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-flight - fixture guard (race day in past 2 days?)
        id: guard
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force mode: bypassing fixture_guard"
            echo "run=true" >> $GITHUB_OUTPUT
          else
            bash scripts/fixture_guard.sh --window 2 --direction past
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.run == 'true'
        with:
          python-version: '3.12'

      - name: Install Python deps
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trainer scraper
        if: steps.guard.outputs.run == 'true'
        run: python TrainerData_Scraper.py

      - name: Push trainer data to main
        if: steps.guard.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python git_sync.py \
            --message "[data][skip ci] trainers $(date -u +%Y-%m-%dT%H:%MZ) via GHA"
