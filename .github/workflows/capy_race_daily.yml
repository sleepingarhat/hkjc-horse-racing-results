name: Capy Race Day — RacingData Results

# Runs RacingData_Scraper.py after each HKJC race meeting to backfill
# the race-result CSVs under data/<year>/results_*.csv.
#
# Polls daily at HK 23:30; scraper self-detects whether a meeting ran
# and exits cleanly when no new data is available.

on:
  schedule:
    # HK 23:30 daily = UTC 15:30
    - cron: '30 15 * * *'
  workflow_dispatch: {}

jobs:
  race-day:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Export browser paths
        run: |
          echo "CHROMIUM_PATH=${{ steps.chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=$(which chromedriver)" >> $GITHUB_ENV

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run race day scraper
        run: python RacingData_Scraper.py || echo "No meeting / scraper exited non-zero — continuing to push whatever exists"

      - name: Push results to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python git_sync.py \
            --message "[data][skip ci] race-day $(date -u +%Y-%m-%dT%H:%MZ) via GHA"
